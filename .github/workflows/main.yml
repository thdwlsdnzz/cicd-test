name: CI - Docker 빌드

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Docker 이미지 빌드
        run: docker build -t cicd-test .

      - name: 빌드 성공 확인
        run: echo "Docker 이미지 빌드 완료!"