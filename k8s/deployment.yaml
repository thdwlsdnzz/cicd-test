apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicd-test
  template:
    metadata:
      labels:
        app: cicd-test
    spec:
      containers:
      - name: cicd-test
        image: python:3.11-slim
        command: ["python", "-c", "print('Hello CI/CD!')"]